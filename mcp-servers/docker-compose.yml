version: '3.8'

services:
  jd-parser:
    build:
      context: ./jd-parser
      dockerfile: Dockerfile
    container_name: synchire-jd-parser
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('healthy')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - synchire-network

  resume-analyzer:
    build:
      context: ./resume-analyzer
      dockerfile: Dockerfile
