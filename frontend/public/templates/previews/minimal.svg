<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-minimal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#ffffff"/>

  <!-- Header section -->
  <rect x="0" y="0" width="800" height="120" fill="url(#grad-minimal)" opacity="0.1"/>

  <!-- Template name -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#1a1a1a" text-anchor="middle">简约风格</text>
  <text x="400" y="90" font-family="Arial, sans-serif" font-size="18" fill="#2563eb" text-anchor="middle">minimal Template</text>

  <!-- Content placeholder boxes -->
  <rect x="50" y="140" width="700" height="40" rx="5" fill="#1a1a1a" opacity="0.1"/>
  <rect x="50" y="190" width="500" height="20" rx="3" fill="#1a1a1a" opacity="0.05"/>
  <rect x="50" y="220" width="600" height="20" rx="3" fill="#1a1a1a" opacity="0.05"/>

  <!-- Section headers -->
  <rect x="50" y="260" width="200" height="30" rx="5" fill="#2563eb" opacity="0.2"/>
  <rect x="50" y="300" width="700" height="60" rx="5" fill="#1a1a1a" opacity="0.05"/>

  <rect x="50" y="380" width="200" height="30" rx="5" fill="#2563eb" opacity="0.2"/>
  <rect x="50" y="420" width="700" height="60" rx="5" fill="#1a1a1a" opacity="0.05"/>

  <!-- Skills section -->
  <rect x="50" y="500" width="200" height="30" rx="5" fill="#2563eb" opacity="0.2"/>
  <rect x="50" y="540" width="100" height="25" rx="12" fill="#1a1a1a" opacity="0.3"/>
  <rect x="160" y="540" width="80" height="25" rx="12" fill="#2563eb" opacity="0.3"/>
  <rect x="250" y="540" width="120" height="25" rx="12" fill="#1a1a1a" opacity="0.3"/>

  <!-- Corner accent -->
  <circle cx="750" cy="550" r="100" fill="url(#grad-minimal)" opacity="0.1"/>
</svg>
