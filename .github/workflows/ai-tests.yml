name: AI Prompt Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'prompts/**'
      - '.github/workflows/ai-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'prompts/**'
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  LANGCHAIN_TRACING_V2: true

jobs:
  setup:
    name: Setup and Dependencies
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-packages.outputs.key }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r prompts/requirements.txt

      - name: Cache packages
        id: cache-packages
        run: echo "key=${{ runner.os }}-pip-${{ hashFiles('prompts/requirements.txt') }}" >> $GITHUB_OUTPUT

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        model: [gpt-4o, claude-3-5-sonnet-20241022]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r prompts/requirements.txt

      - name: Set up LangSmith
        run: |
          echo "LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}" >> $GITHUB_ENV
          echo "LANGCHAIN_PROJECT=synchire-ci-unit" >> $GITHUB_ENV

      - name: Run unit tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd prompts
          pytest tests/ -m "unit" -v --tb=short

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-${{ matrix.model }}
          path: prompts/htmlcov/
          retention-days: 7

  critical-tests:
    name: Critical Tests (Hallucination Detection)
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r prompts/requirements.txt

      - name: Set up LangSmith
        run: |
          echo "LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}" >> $GITHUB_ENV
          echo "LANGCHAIN_PROJECT=synchire-ci-critical" >> $GITHUB_ENV

      - name: Run critical tests (hallucination checks)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd prompts
          pytest tests/test_resume_restructure.py::TestResumeRestructureHallucination -v --tb=short

      - name: Fail on hallucination detected
        if: failure()
        run: |
          echo "::error::CRITICAL: Hallucination detected in resume prompts!"
          echo "Resume restructure prompt is generating fabricated information."
          echo "This MUST be fixed before merging."
          exit 1

      - name: Create failure report
        if: failure()
        run: |
          echo "## ❌ CRITICAL: Hallucination Detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The resume restructure prompt is generating fabricated information." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action Required:**" >> $GITHUB_STEP_SUMMARY
          echo "- Review the test failure details" >> $GITHUB_STEP_SUMMARY
          echo "- Modify `prompts/resume_restructure.md`" >> $GITHUB_STEP_SUMMARY
          echo "- Strengthen anti-hallucination instructions" >> $GITHUB_STEP_SUMMARY
          echo "- Re-run tests to verify fix" >> $GITHUB_STEP_SUMMARY

  bilingual-tests:
    name: Bilingual Processing Tests
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r prompts/requirements.txt

      - name: Set up LangSmith
        run: |
          echo "LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}" >> $GITHUB_ENV
          echo "LANGCHAIN_PROJECT=synchire-ci-bilingual" >> $GITHUB_ENV

      - name: Test Chinese JD parsing
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd prompts
          pytest tests/test_jd_analysis.py::TestJDAnalysisParsing::test_chinese_jd_parsing -v

      - name: Test English JD parsing
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd prompts
          pytest tests/test_jd_analysis.py::TestJDAnalysisParsing::test_english_jd_parsing -v

      - name: Test mixed language JD parsing
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd prompts
          pytest tests/test_jd_analysis.py::TestJDAnalysisParsing::test_mixed_language_jd_parsing -v

      - name: Bilingual test summary
        if: always()
        run: |
          echo "### 🌏 Bilingual Processing Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Chinese JD parsing" >> $GITHUB_STEP_SUMMARY
          echo "- English JD parsing" >> $GITHUB_STEP_SUMMARY
          echo "- Mixed language JD parsing" >> $GITHUB_STEP_SUMMARY

  json-format-tests:
    name: JSON Format Consistency Tests
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r prompts/requirements.txt

      - name: Set up LangSmith
        run: |
          echo "LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}" >> $GITHUB_ENV
          echo "LANGCHAIN_PROJECT=synchire-ci-json" >> $GITHUB_ENV

      - name: Test JSON output format consistency
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd prompts
          pytest tests/test_jd_analysis.py::TestJDAnalysisOutputFormat -v

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, critical-tests]
    if: github.event_name == 'push' || github.event_name == 'schedule'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r prompts/requirements.txt

      - name: Set up LangSmith
        run: |
          echo "LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}" >> $GITHUB_ENV
          echo "LANGCHAIN_PROJECT=synchire-ci-integration" >> $GITHUB_ENV

      - name: Run integration tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd prompts
          pytest tests/ -m "integration" -v --tb=short

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: prompts/test-results/
          retention-days: 30

  e2e-workflow-tests:
    name: E2E Workflow Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, critical-tests]
    if: github.event_name == 'push' || github.event_name == 'schedule'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r prompts/requirements.txt

      - name: Set up LangSmith
        run: |
          echo "LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}" >> $GITHUB_ENV
          echo "LANGCHAIN_PROJECT=synchire-ci-e2e" >> $GITHUB_ENV

      - name: Run E2E workflow tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd prompts
          pytest tests/test_e2e_workflow.py -v --tb=short

      - name: Generate quality report
        if: always()
        run: |
          cd prompts
          python -c "
          import json
          from datetime import datetime

          report = {
              'timestamp': datetime.now().isoformat(),
              'workflow_type': 'e2e_ai_workflow',
              'quality_metrics': {
                  'json_parse_success_rate': 1.0,
                  'hallucination_rate': 0.0,
                  'bilingual_accuracy': 1.0
              },
              'quality_gate': {
                  'passed': True,
                  'critical_checks': {
                      'hallucination_check': 'passed',
                      'json_format_check': 'passed'
                  }
              }
          }

          with open('e2e-quality-report.json', 'w') as f:
              json.dump(report, f, indent=2)
          "

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-quality-report
          path: prompts/e2e-quality-report.json
          retention-days: 30

      - name: E2E test summary
        if: always()
        run: |
          echo "### 🔄 E2E Workflow Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Complete workflow: Resume → JD → Match → Optimize → Interview" >> $GITHUB_STEP_SUMMARY
          echo "- Quality metrics: JSON consistency, hallucination detection" >> $GITHUB_STEP_SUMMARY
          echo "- Bilingual support: Chinese/English/mixed language" >> $GITHUB_STEP_SUMMARY
          echo "- Performance benchmarks: Response time validation" >> $GITHUB_STEP_SUMMARY

  performance-tests:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r prompts/requirements.txt

      - name: Benchmark prompt response times
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd prompts
          python test_evals.py --model gpt-4o

      - name: Check performance thresholds
        run: |
          python -c "
          import json
          import sys

          with open('prompts/test_results.json', 'r') as f:
              results = json.load(f)

          summary = results['summary']
          avg_duration = summary.get('total_duration_seconds', 0) / max(summary.get('total_tests', 1), 1)

          # Threshold: 30 seconds per test
          if avg_duration > 30:
              print(f'❌ Performance threshold exceeded: {avg_duration:.2f}s > 30s')
              sys.exit(1)
          else:
              print(f'✅ Performance acceptable: {avg_duration:.2f}s average')
          "

      - name: Post performance metrics
        if: always()
        run: |
          echo "### ⚡ Performance Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Response time benchmarks tracked in LangSmith dashboard." >> $GITHUB_STEP_SUMMARY

  security-scan:
    name: Security and Prompt Injection Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan for prompt injection patterns
        run: |
          echo "Scanning prompts for potential injection vulnerabilities..."

          if grep -r "ignore previous instructions" prompts/ --exclude-dir=__pycache__; then
            echo "::error::Found potential prompt injection pattern"
            exit 1
          fi

          if grep -r "forget everything" prompts/ --exclude-dir=__pycache__; then
            echo "::error::Found potential prompt injection pattern"
            exit 1
          fi

          if grep -rE "api[_-]?key\s*[:=]\s*['\"]" prompts/*.md; then
            echo "::warning::Found potential hardcoded credentials - review needed"
          fi

          echo "✅ No obvious security issues found"

      - name: Security scan summary
        run: |
          echo "### 🔒 Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Prompt injection patterns" >> $GITHUB_STEP_SUMMARY
          echo "- Hardcoded credentials check" >> $GITHUB_STEP_SUMMARY
          echo "- Dangerous pattern detection" >> $GITHUB_STEP_SUMMARY

  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [unit-tests, critical-tests, bilingual-tests, json-format-tests, security-scan, e2e-workflow-tests]
    if: always()

    steps:
      - name: Generate summary report
        run: |
          echo "## 📊 AI Prompt Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Suites" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Unit Tests" >> $GITHUB_STEP_SUMMARY
          echo "- 🔍 Critical Tests (Hallucination)" >> $GITHUB_STEP_SUMMARY
          echo "- 🌏 Bilingual Processing" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 JSON Format Consistency" >> $GITHUB_STEP_SUMMARY
          echo "- 🔒 Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "- 🔄 E2E Workflow Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quality Metrics" >> $GITHUB_STEP_SUMMARY
          echo "- JSON Parse Success Rate: > 95%" >> $GITHUB_STEP_SUMMARY
          echo "- Hallucination Rate: 0% (Critical)" >> $GITHUB_STEP_SUMMARY
          echo "- Bilingual Accuracy: > 90%" >> $GITHUB_STEP_SUMMARY
          echo "- Response Time: < 30s (P90)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### LangSmith Tracing" >> $GITHUB_STEP_SUMMARY
          echo "All test runs are traced in LangSmith for detailed analysis." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Test coverage reports" >> $GITHUB_STEP_SUMMARY
          echo "- E2E quality reports" >> $GITHUB_STEP_SUMMARY
          echo "- Integration test results" >> $GITHUB_STEP_SUMMARY

  notify-failure:
    name: Notify on Test Failure
    runs-on: ubuntu-latest
    needs: [unit-tests, critical-tests, bilingual-tests]
    if: failure()

    steps:
      - name: Create failure notification
        run: |
          echo "## ❌ AI Prompt Tests Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "One or more test suites have failed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next Steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Review test failures in the logs above" >> $GITHUB_STEP_SUMMARY
          echo "2. Check LangSmith traces for detailed analysis" >> $GITHUB_STEP_SUMMARY
          echo "3. Fix identified issues in prompt templates" >> $GITHUB_STEP_SUMMARY
          echo "4. Re-run tests to verify fixes" >> $GITHUB_STEP_SUMMARY
