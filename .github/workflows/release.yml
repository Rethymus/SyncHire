name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag or release name (for manual runs)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

env:
  NODE_VERSION: "22.x"
  RUST_VERSION: stable
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  desktop:
    name: Desktop ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows
            runner: windows-latest
            bundles: nsis
            artifact-name: SyncHire-Windows
            artifact-path: |
              src-tauri/target/release/bundle/nsis/*.exe
          - name: macos
            runner: macos-latest
            bundles: dmg
            artifact-name: SyncHire-macOS
            artifact-path: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - name: linux
            runner: ubuntu-latest
            bundles: deb
            artifact-name: SyncHire-Linux
            artifact-path: |
              src-tauri/target/release/bundle/deb/*.deb

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install npm dependencies
        run: npm ci --include=optional --no-audit --no-fund

      - name: Ensure Tailwind native dependency
        run: node scripts/install-tailwind-oxide.mjs

      - name: Build desktop installer
        run: npx tauri build --bundles ${{ matrix.platform.bundles }}

      - name: Upload desktop installer
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.platform.artifact-name }}
          path: ${{ matrix.platform.artifact-path }}
          if-no-files-found: error
          retention-days: 30

  android:
    name: Android APK
    runs-on: ubuntu-latest
    env:
      HAS_ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build platform
        run: |
          yes | sdkmanager --licenses || true
          yes | sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Install npm dependencies
        run: npm ci --include=optional --no-audit --no-fund

      - name: Ensure Tailwind native dependency
        run: node scripts/install-tailwind-oxide.mjs

      - name: Build static frontend and sync Android
        run: npm run android:sync

      - name: Decode Android signing keystore
        if: env.HAS_ANDROID_KEYSTORE == 'true'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Build signed Android release APK
        if: env.HAS_ANDROID_KEYSTORE == 'true'
        working-directory: android
        env:
          CAPACITOR_ANDROID_STUDIO_PATH: ""
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$PWD/app/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Build debug-signed Android APK
        if: env.HAS_ANDROID_KEYSTORE != 'true'
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload signed Android APK
        if: env.HAS_ANDROID_KEYSTORE == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: SyncHire-Android
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload debug-signed Android APK
        if: env.HAS_ANDROID_KEYSTORE != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: SyncHire-Android
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [desktop, android]

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -maxdepth 2 -type f -print | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          name: SyncHire ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
