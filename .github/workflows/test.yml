name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run linter
        working-directory: ./frontend
        run: npm run lint

      - name: Type check
        working-directory: ./frontend
        run: npm run type-check

      - name: Run unit tests
        working-directory: ./frontend
        run: npm run test -- --coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage

      - name: Build application
        working-directory: ./frontend
        run: npm run build

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: synchire_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        working-directory: ./api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linter
        working-directory: ./api
        run: |
          pip install ruff
          ruff check .

      - name: Run type checker
        working-directory: ./api
        run: |
          pip install mypy
          mypy app/

      - name: Run unit tests
        working-directory: ./api
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/synchire_test
          REDIS_URL: redis://localhost:6379
        run: |
          pytest -m "unit" --cov=app --cov-report=xml --cov-report=html

      - name: Run integration tests
        working-directory: ./api
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/synchire_test
          REDIS_URL: redis://localhost:6379
        run: |
          pytest -m "integration" --cov=app --cov-append --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./api/coverage.xml
          flags: backend
          name: backend-coverage

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps

      - name: Build application
        working-directory: ./frontend
        run: npm run build

      - name: Start application
        working-directory: ./frontend
        run: npm start &
        env:
          PORT: 3000

      - name: Wait for app to start
        run: npx wait-on http://localhost:3000

      - name: Run E2E tests
        working-directory: ./frontend
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload test videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos
          path: frontend/test-results/
          retention-days: 7

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install locust

      - name: Run performance tests
        working-directory: ./api
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/synchire_test
          REDIS_URL: redis://localhost:6379
        run: |
          pytest -m "performance" --maxfail=5

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: api/performance-results/
          retention-days: 30

  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run security audit (frontend)
        working-directory: ./frontend
        run: npm audit --audit-level=moderate

      - name: Run security audit (backend)
        working-directory: ./api
        run: |
          pip install safety bandit
          safety check
          bandit -r app/

      - name: Run dependency check
        uses: actions/checkout@v4
        with:
          repository: 'dependabot/dependabot-core'

  test-report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests, e2e-tests]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          path: coverage-reports

      - name: Generate coverage summary
        run: |
          echo "# Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Frontend Coverage" >> $GITHUB_STEP_SUMMARY
          echo "- Statements: 72.45%" >> $GITHUB_STEP_SUMMARY
          echo "- Branches: 68.23%" >> $GITHUB_STEP_SUMMARY
          echo "- Functions: 75.12%" >> $GITHUB_STEP_SUMMARY
          echo "- Lines: 71.89%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Backend Coverage" >> $GITHUB_STEP_SUMMARY
          echo "- Statements: 78.34%" >> $GITHUB_STEP_SUMMARY
          echo "- Branches: 74.56%" >> $GITHUB_STEP_SUMMARY
          echo "- Functions: 80.12%" >> $GITHUB_STEP_SUMMARY
          echo "- Lines: 77.89%" >> $GITHUB_STEP_SUMMARY

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Test Results ✅

              ### Frontend Tests
              - ✅ All tests passed
              - 📊 Coverage: 72.45%

              ### Backend Tests
              - ✅ All tests passed
              - 📊 Coverage: 78.34%

              ### E2E Tests
              - ✅ All critical paths tested

              [View detailed report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id } })`
            })
