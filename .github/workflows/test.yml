name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22.x'
  PYTHON_VERSION: '3.11'

jobs:
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Run linter
        run: npm run lint --workspace=frontend

      - name: Type check
        run: npm run type-check --workspace=frontend

      - name: Run unit tests
        run: npm run test --workspace=frontend -- --coverage

      - name: Build application
        run: npm run build --workspace=frontend
        env:
          NODE_ENV: production

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run formatter check
        run: black --check .

      - name: Run linter
        run: ruff check .

      - name: Run health tests
        run: python -m pytest tests/test_api.py::TestHealthEndpoints -v --tb=short
        env:
          TEST_MODE: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit pip-audit ruff

      - name: Run Bandit security scan
        working-directory: ./api
        run: bandit -r app/ -f json -o bandit-report.json || true

      - name: Run dependency audit
        working-directory: ./api
        run: pip-audit -r requirements.txt --format json --output pip-audit-report.json

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-security-reports
          path: |
            api/bandit-report.json
            api/pip-audit-report.json

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests, security-scan]
    if: always()

    steps:
      - name: Check required jobs
        run: |
          if [ "${{ needs.frontend-tests.result }}" != "success" ]; then
            echo "Frontend tests failed"
            exit 1
          fi

          if [ "${{ needs.backend-tests.result }}" != "success" ]; then
            echo "Backend tests failed"
            exit 1
          fi

          if [ "${{ needs.security-scan.result }}" != "success" ]; then
            echo "Security scan failed"
            exit 1
          fi

      - name: Create summary
        run: |
          echo "## CI Test Suite Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: passed lint, type-check, unit tests, and build" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: passed Black, Ruff, and health tests" >> $GITHUB_STEP_SUMMARY
          echo "- Security: generated Bandit and Safety reports" >> $GITHUB_STEP_SUMMARY
