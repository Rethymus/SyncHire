services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: synchire-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-synchire}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synchire_dev}
      POSTGRES_DB: ${POSTGRES_DB:-synchire}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synchire}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - synchire_network

  redis:
    image: redis:7.2-alpine
    container_name: synchire-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - synchire_network

  minio:
    image: minio/minio:latest
    container_name: synchire-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - synchire_network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: synchire-api
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-synchire}:${POSTGRES_PASSWORD:-synchire_dev}@postgres:5432/${POSTGRES_DB:-synchire}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - synchire_network
    volumes:
      - ./api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: synchire-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - synchire_network
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  synchire_network:
    driver: bridge
