<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume - Professional Template</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.5;
            color: #2c3e50;
            background: #ffffff;
            font-size: 10pt;
        }

        .container {
            display: flex;
            width: 8.5in;
            min-height: 11in;
            margin: 0 auto;
            background: white;
        }

        /* Sidebar */
        .sidebar {
            width: 2.2in;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 0.6in 0.4in;
            flex-shrink: 0;
        }

        .sidebar-section {
            margin-bottom: 20pt;
            page-break-inside: avoid;
            break-inside: avoid;
        }

        .sidebar-title {
            font-size: 9pt;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1pt solid rgba(255,255,255,0.3);
            padding-bottom: 4pt;
            margin-bottom: 8pt;
        }

        .sidebar-content {
            font-size: 8.5pt;
            line-height: 1.4;
        }

        .contact-item {
            display: flex;
            align-items: flex-start;
            gap: 6pt;
            margin-bottom: 6pt;
            word-break: break-word;
        }

        .contact-icon {
            width: 12pt;
            flex-shrink: 0;
            text-align: center;
        }

        .skill-item {
            margin-bottom: 4pt;
            font-size: 8.5pt;
        }

        .skill-name {
            font-weight: 500;
        }

        .skill-level {
            display: flex;
            gap: 2pt;
            margin-top: 2pt;
        }

        .skill-dot {
            width: 8pt;
            height: 3pt;
            background: rgba(255,255,255,0.3);
            border-radius: 1.5pt;
        }

        .skill-dot.filled {
            background: #fff;
        }

        .language-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4pt;
        }

        /* Main Content */
        .main {
            flex: 1;
            padding: 0.6in 0.6in 0.6in 0.5in;
        }

        .header {
            margin-bottom: 20pt;
        }

        .name {
            font-size: 20pt;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 4pt;
            color: #2c3e50;
        }

        .title {
            font-size: 11pt;
            font-weight: 500;
            color: #7f8c8d;
        }

        .section {
            margin-bottom: 18pt;
            page-break-inside: avoid;
            break-inside: avoid;
        }

        .section-title {
            font-size: 10pt;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #2c3e50;
            border-bottom: 2pt solid #3498db;
            padding-bottom: 3pt;
            margin-bottom: 8pt;
        }

        /* Experience */
        .experience-item {
            margin-bottom: 12pt;
        }

        .experience-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 2pt;
        }

        .company-name {
            font-size: 10pt;
            font-weight: 600;
            color: #2c3e50;
        }

        .experience-date {
            font-size: 8pt;
            color: #7f8c8d;
            font-weight: 500;
        }

        .position-title {
            font-size: 9pt;
            font-weight: 500;
            color: #3498db;
            margin-bottom: 2pt;
        }

        .experience-location {
            font-size: 8pt;
            color: #95a5a6;
            margin-bottom: 4pt;
        }

        .experience-description {
            font-size: 9pt;
            line-height: 1.5;
            color: #34495e;
        }

        .experience-description ul {
            margin: 3pt 0 0 12pt;
        }

        .experience-description li {
            margin-bottom: 2pt;
        }

        /* Education */
        .education-item {
            margin-bottom: 8pt;
        }

        .education-header {
            display: flex;
            justify-content: space-between;
        }

        .school-name {
            font-size: 10pt;
            font-weight: 600;
            color: #2c3e50;
        }

        .education-date {
            font-size: 8pt;
            color: #7f8c8d;
        }

        .degree {
            font-size: 9pt;
            color: #34495e;
            margin-top: 1pt;
        }

        /* Projects */
        .project-item {
            margin-bottom: 8pt;
        }

        .project-name {
            font-size: 9pt;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 2pt;
        }

        .project-description {
            font-size: 8.5pt;
            color: #34495e;
            line-height: 1.4;
        }

        /* Page breaks */
        .page-break {
            page-break-before: always;
            break-before: page;
        }

        @media print {
            body {
                background: white;
            }
        }

        @page {
            margin: 0;
            size: letter;
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            {{sidebar}}
        </aside>
        <main class="main">
            {{content}}
        </main>
    </div>
</body>
</html>
