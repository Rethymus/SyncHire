<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume - Executive Template</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&family=Source+Sans+Pro:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Sans Pro', 'Noto Sans SC', sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            background: #ffffff;
            font-size: 11pt;
        }

        .page {
            width: 8.5in;
            min-height: 11in;
            padding: 0.8in 0.9in 0.7in;
            margin: 0 auto;
            background: white;
            position: relative;
        }

        .page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4pt;
            background: linear-gradient(90deg, #1a1a1a 0%, #4a4a4a 100%);
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 24pt;
            padding-bottom: 16pt;
            border-bottom: 1pt solid #e0e0e0;
        }

        .name {
            font-family: 'Playfair Display', serif;
            font-size: 26pt;
            font-weight: 700;
            letter-spacing: 0.05em;
            margin-bottom: 6pt;
            color: #1a1a1a;
        }

        .title {
            font-size: 11pt;
            font-weight: 400;
            color: #666;
            margin-bottom: 10pt;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .contact {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12pt;
            font-size: 9pt;
            color: #666;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 4pt;
        }

        /* Sections */
        .section {
            margin-bottom: 18pt;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 12pt;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            border-bottom: 2pt solid #1a1a1a;
            padding-bottom: 4pt;
            margin-bottom: 12pt;
            color: #1a1a1a;
        }

        /* Executive Summary */
        .summary {
            font-size: 10pt;
            line-height: 1.7;
            color: #333;
            text-align: justify;
            margin-bottom: 4pt;
        }

        /* Experience */
        .experience-item {
            margin-bottom: 14pt;
            page-break-inside: avoid;
            break-inside: avoid;
        }

        .experience-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 3pt;
        }

        .company-name {
            font-size: 11pt;
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: 0.05em;
        }

        .experience-date {
            font-size: 9pt;
            color: #666;
            font-weight: 400;
        }

        .position-title {
            font-size: 10pt;
            font-weight: 600;
            color: #333;
            margin-bottom: 2pt;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .experience-location {
            font-size: 9pt;
            color: #666;
            margin-bottom: 6pt;
            font-style: italic;
        }

        .experience-description {
            font-size: 10pt;
            line-height: 1.6;
            color: #333;
        }

        .experience-description ul {
            margin: 4pt 0 0 16pt;
        }

        .experience-description li {
            margin-bottom: 3pt;
        }

        /* Leadership Highlights */
        .highlight-box {
            background: #f8f8f8;
            border-left: 3pt solid #1a1a1a;
            padding: 8pt 10pt;
            margin: 8pt 0;
            font-size: 9pt;
            line-height: 1.5;
            color: #333;
        }

        /* Education */
        .education-item {
            margin-bottom: 10pt;
        }

        .education-header {
            display: flex;
            justify-content: space-between;
        }

        .school-name {
            font-size: 10pt;
            font-weight: 600;
            color: #1a1a1a;
        }

        .education-date {
            font-size: 9pt;
            color: #666;
        }

        .degree {
            font-size: 9pt;
            color: #333;
            margin-top: 1pt;
        }

        /* Skills */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8pt;
        }

        .skill-category {
            margin-bottom: 2pt;
        }

        .skill-category-title {
            font-size: 9pt;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 2pt;
        }

        .skill-items {
            font-size: 9pt;
            color: #333;
            line-height: 1.4;
        }

        /* Awards & Recognition */
        .award-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4pt;
            font-size: 9pt;
        }

        .award-name {
            font-weight: 500;
            color: #333;
        }

        .award-year {
            color: #666;
        }

        /* Page breaks */
        .page-break {
            page-break-before: always;
            break-before: page;
        }

        .no-break {
            page-break-inside: avoid;
            break-inside: avoid;
        }

        @media print {
            body {
                background: white;
            }
        }

        @page {
            margin: 0.8in 0.9in 0.7in;
            size: letter;
        }
    </style>
</head>
<body>
    <div class="page">
        {{content}}
    </div>
</body>
</html>
