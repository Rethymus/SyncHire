apiVersion: v1
kind: Secret
metadata:
  name: synchire-secrets
  namespace: default
type: Opaque
stringData:
  # Database
  POSTGRES_USER: "synchire"
  POSTGRES_PASSWORD: "CHANGE_THIS_PASSWORD"
  DATABASE_URL: "postgresql://synchire:CHANGE_THIS_PASSWORD@postgres-service:5432/synchire"

  # Redis
  REDIS_PASSWORD: "CHANGE_THIS_REDIS_PASSWORD"
  REDIS_URL: "redis://:CHANGE_THIS_REDIS_PASSWORD@redis-service:6379"

  # JWT
  JWT_SECRET: "CHANGE_THIS_JWT_SECRET_GENERATE_WITH_OPENSSL"

  # AI APIs
  OPENAI_API_KEY: "YOUR_OPENAI_API_KEY"
  ANTHROPIC_API_KEY: "YOUR_ANTHROPIC_API_KEY"

  # Minio
  MINIO_ROOT_USER: "minioadmin"
  MINIO_ROOT_PASSWORD: "CHANGE_THIS_MINIO_PASSWORD"
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "CHANGE_THIS_MINIO_PASSWORD"

  # OAuth
  GOOGLE_OAUTH_CLIENT_ID: "YOUR_GOOGLE_OAUTH_CLIENT_ID"
  GOOGLE_OAUTH_CLIENT_SECRET: "YOUR_GOOGLE_OAUTH_CLIENT_SECRET"
  GITHUB_OAUTH_CLIENT_ID: "YOUR_GITHUB_OAUTH_CLIENT_ID"
  GITHUB_OAUTH_CLIENT_SECRET: "YOUR_GITHUB_OAUTH_CLIENT_SECRET"
