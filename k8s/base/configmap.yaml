apiVersion: v1
kind: ConfigMap
metadata:
  name: synchire-config
  namespace: default
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  API_PORT: "8000"
  FRONTEND_PORT: "3000"
  MAX_FILE_SIZE: "10485760"
  ALLOWED_FILE_TYPES: "pdf,doc,docx"
  RATE_LIMIT_PER_MINUTE: "60"
  DEFAULT_PAGE_SIZE: "20"
  MAX_PAGE_SIZE: "100"
  MCP_SERVER_TIMEOUT: "30000"
  MCP_MAX_CONCURRENT_REQUESTS: "10"
