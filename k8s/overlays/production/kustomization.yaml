apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: production

namePrefix: prod-

resources:
- ../../base

patchesStrategicMerge:
- backend-replicas.yaml
- frontend-replicas.yaml
- resources.yaml

images:
- name: synchire/backend
  newTag: production-latest
- name: synchire/frontend
  newTag: production-latest

configMapGenerator:
- name: synchire-config
  behavior: merge
  literals:
  - LOG_LEVEL=warning
  - RATE_LIMIT_PER_MINUTE=100
  - MAX_PAGE_SIZE=50

secretGenerator:
- name: synchire-secrets
  behavior: replace
  literals:
  # These should be replaced with actual secrets in production
  - POSTGRES_PASSWORD=CHANGE_THIS_PRODUCTION_PASSWORD
  - REDIS_PASSWORD=CHANGE_THIS_PRODUCTION_REDIS_PASSWORD
  - JWT_SECRET=CHANGE_THIS_PRODUCTION_JWT_SECRET
